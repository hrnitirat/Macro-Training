<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบอบรม Macro & VBA — Nitirat</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --dg:#2D5A27;--mg:#4A8C3F;--sg:#6BAE6B;
  --mint:#EEF7EE;--mint2:#D6EDD6;--cream:#FFFDE7;
  --purple:#7B5EA7;--pbg:#F3EEF9;
  --red:#C62828;--rbg:#FFEBEE;
  --orange:#E65100;--obg:#FFF3E0;
  --teal:#00695C;--tbg:#E0F2F1;
  --text:#1A2E1A;--muted:#5A7A54;--border:#C8E0C8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Sarabun",sans-serif;background:var(--mint);color:var(--text);min-height:100vh;}

/* ── Header ── */
.hdr{background:var(--dg);padding:1.5rem 2rem 1.3rem;position:relative;overflow:hidden;}
.hdr::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(107,174,107,.15);}
.hdr-inner{position:relative;z-index:1;max-width:960px;margin:0 auto;}
.org{color:var(--sg);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem;}
.hdr h1{color:#fff;font-size:1.45rem;font-weight:700;}
.hdr h1 span{color:var(--sg);}
.hdr-row2{display:flex;align-items:center;justify-content:space-between;margin-top:.7rem;flex-wrap:wrap;gap:.5rem;}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(107,174,107,.2);color:var(--sg);font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--sg);animation:pulse 2s infinite;}
.dot.err{background:#EF9A9A;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-actions{display:flex;gap:.4rem;}
.hdr-btn{padding:4px 11px;border-radius:10px;border:1px solid rgba(255,255,255,.28);background:transparent;color:rgba(255,255,255,.85);font-size:.72rem;cursor:pointer;font-family:"Sarabun",sans-serif;}
.hdr-btn:hover{background:rgba(255,255,255,.1);}

/* ── Floating register button ── */
.reg-float{position:fixed;top:14px;right:16px;z-index:200;
  display:flex;align-items:center;gap:6px;
  background:#fff;color:var(--dg);text-decoration:none;
  border-radius:22px;padding:7px 14px;
  font-family:"Sarabun",sans-serif;font-size:.8rem;font-weight:700;
  box-shadow:0 3px 14px rgba(0,0,0,.2);
  border:2px solid var(--sg);
  transition:transform .15s,box-shadow .15s;}
.reg-float:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,0,0,.25);}
.reg-float .rbadge{background:var(--mg);color:#fff;font-size:.6rem;padding:1px 6px;border-radius:10px;}

/* ── Stats ── */
.stats{max-width:960px;margin:0 auto;padding:.9rem 2rem 0;display:flex;gap:.6rem;flex-wrap:wrap;}
.stat{background:#fff;border-radius:10px;padding:.65rem .95rem;box-shadow:0 1px 6px rgba(45,90,39,.08);flex:1;min-width:110px;border-top:3px solid var(--mint2);transition:border-color .3s;}
.stat-n{font-family:"IBM Plex Mono",monospace;font-size:1.35rem;font-weight:500;color:var(--dg);}
.stat-l{font-size:.65rem;color:var(--muted);margin-top:1px;}

/* ── Tabs ── */
.tabs-wrap{max-width:960px;margin:.8rem auto 0;padding:0 2rem;display:flex;gap:.35rem;flex-wrap:wrap;}
.tab{padding:.44rem .95rem;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;background:var(--mint2);color:var(--muted);transition:all .2s;font-family:"Sarabun",sans-serif;}
.tab.on{background:var(--dg);color:#fff;}
.tab.hr.on{background:var(--purple);}
.tab.settings.on{background:#37474F;color:#fff;}

/* ── Main ── */
.main{max-width:960px;margin:0 auto;padding:.85rem 2rem 2.5rem;}
.panel{display:none;}.panel.on{display:block;}

/* ── Round card ── */
.rcard{background:#fff;border-radius:10px;padding:.8rem 1.1rem;border-left:4px solid var(--mg);box-shadow:0 1px 5px rgba(45,90,39,.07);margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.rdate{font-size:.84rem;font-weight:600;color:var(--dg);}
.rmeta{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* ── Cap bar ── */
.cap-card{background:#fff;border-radius:10px;padding:.8rem 1.1rem;box-shadow:0 1px 5px rgba(45,90,39,.07);margin-bottom:.8rem;display:flex;align-items:center;gap:.85rem;}
.cap-n{font-family:"IBM Plex Mono",monospace;font-size:1.5rem;font-weight:500;color:var(--dg);min-width:45px;text-align:center;}
.cap-sub{font-size:.66rem;color:var(--muted);text-align:center;}
.cap-bw{flex:1;}
.cap-row{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:4px;}
.cap-bar{height:8px;background:var(--mint2);border-radius:8px;overflow:hidden;}
.cap-fill{height:100%;border-radius:8px;transition:width .6s ease;}
.fill-g{background:linear-gradient(90deg,var(--mg),var(--sg));}
.fill-p{background:linear-gradient(90deg,var(--purple),#9B7EC8);}
.fill-t{background:linear-gradient(90deg,var(--teal),#4DB6AC);}
.cap-st{font-size:.7rem;font-weight:600;color:var(--mg);margin-top:3px;}

/* ── Sec head ── */
.sh{display:flex;align-items:center;gap:7px;margin:.95rem 0 .65rem;}
.sbadge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:.76rem;font-weight:600;}
.sb-g{background:var(--dg);color:#fff;}.sb-p{background:var(--purple);color:#fff;}.sb-t{background:var(--teal);color:#fff;}
.scnt{font-size:.68rem;color:var(--muted);background:var(--mint2);padding:2px 8px;border-radius:20px;}

/* ── Cards ── */
.cards{display:flex;flex-direction:column;gap:.38rem;}
.card{background:#fff;border-radius:9px;padding:.65rem .9rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 1px 4px rgba(45,90,39,.06);border-left:4px solid transparent;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card.r1{border-left-color:var(--mg);}
.card.r2c{border-left-color:var(--purple);background:var(--pbg);}
.card.r3c{border-left-color:var(--teal);background:var(--tbg);}
.card.swapped-up{border-left-color:var(--orange)!important;background:var(--obg)!important;}
.card.moved-down{border-left-color:#9E9E9E!important;background:#FAFAFA!important;opacity:.8;}
.rank{font-family:"IBM Plex Mono",monospace;font-size:.88rem;font-weight:500;color:var(--sg);min-width:21px;text-align:center;}
.card.r2c .rank{color:var(--purple);opacity:.65;}
.card.r3c .rank{color:var(--teal);}
.card.moved-down .rank{color:#9E9E9E;}
.card.swapped-up .rank{color:var(--orange);}
.ava{width:31px;height:31px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;color:#fff;}
.card.r1 .ava{background:linear-gradient(135deg,var(--mg),var(--sg));}
.card.r2c .ava{background:linear-gradient(135deg,var(--purple),#9B7EC8);}
.card.r3c .ava{background:linear-gradient(135deg,var(--teal),#4DB6AC);}
.card.swapped-up .ava{background:linear-gradient(135deg,var(--orange),#FF8A65);}
.card.moved-down .ava{background:#9E9E9E;}
.ci{flex:1;min-width:0;}
.cn{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card.r2c .cn{color:var(--purple);}
.card.r3c .cn{color:var(--teal);}
.card.moved-down .cn{color:#9E9E9E;}
.ck{font-size:.7rem;color:var(--muted);margin-top:1px;}
.cr{text-align:right;flex-shrink:0;}
.cid{font-family:"IBM Plex Mono",monospace;font-size:.66rem;color:var(--muted);background:var(--mint);padding:1px 5px;border-radius:4px;}
.card.r2c .cid{background:rgba(123,94,167,.1);color:var(--purple);}
.card.r3c .cid{background:rgba(0,105,92,.1);color:var(--teal);}
.ct{font-size:.62rem;color:var(--muted);margin-top:1px;}
.tag{font-size:.6rem;font-weight:600;padding:2px 6px;border-radius:7px;display:inline-block;margin-top:2px;}
.t-ok{background:var(--mint2);color:var(--dg);}
.t-wl{background:rgba(123,94,167,.12);color:var(--purple);}
.t-wl3{background:rgba(0,105,92,.12);color:var(--teal);}
.t-pres{background:#E8F5E9;color:#2E7D32;}
.t-swu{background:var(--obg);color:var(--orange);}
.t-mov{background:#F5F5F5;color:#9E9E9E;}

/* ── Att buttons ── */
.att-btns{display:flex;gap:3px;flex-shrink:0;}
.att-btn{display:inline-flex;align-items:center;justify-content:center;height:27px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:.72rem;font-weight:600;transition:all .15s;background:#fff;font-family:"Sarabun",sans-serif;padding:0 7px;white-space:nowrap;}
.att-btn.yes{background:var(--mg);border-color:var(--mg);color:#fff;}
.att-btn.yes:not(.active):hover{background:var(--mint2);border-color:var(--mg);color:var(--mg);}
.att-btn.swap.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.att-btn.swap:not(.active){background:var(--obg);border-color:var(--orange);color:var(--orange);}
.att-btn.absent{background:var(--rbg);border-color:var(--red);color:var(--red);}
.att-btn.absent.active{background:var(--red);border-color:var(--red);color:#fff;}
.att-btn.clr{background:#F5F5F5;border-color:#ccc;color:#9E9E9E;font-size:.68rem;}

/* ── Swap picker ── */
.swap-sel{background:#fff;border:2px solid var(--orange);border-radius:10px;padding:.8rem 1rem;margin:.3rem 0 .5rem 2rem;box-shadow:0 4px 18px rgba(0,0,0,.1);}
.swap-sel-title{font-size:.8rem;font-weight:700;color:var(--orange);margin-bottom:.5rem;}
.swap-option{display:flex;align-items:center;gap:.55rem;padding:.45rem .6rem;border-radius:7px;cursor:pointer;transition:background .12s;}
.swap-option:hover{background:var(--obg);}
.swap-opt-name{font-size:.82rem;font-weight:600;flex:1;}
.swap-opt-sub{font-size:.7rem;color:var(--muted);}
.swap-go{color:var(--orange);font-size:.76rem;font-weight:700;}
.swap-cancel{margin-top:.4rem;font-size:.72rem;color:var(--muted);cursor:pointer;text-decoration:underline;padding:.2rem 0;}

/* ── Settings panel ── */
.settings-box{background:#fff;border-radius:10px;padding:1.1rem 1.3rem;box-shadow:0 1px 6px rgba(45,90,39,.07);margin-bottom:.8rem;}
.settings-title{font-size:.9rem;font-weight:700;color:#37474F;margin-bottom:.9rem;display:flex;align-items:center;gap:6px;}
.settings-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.65rem;flex-wrap:wrap;}
.settings-label{font-size:.8rem;font-weight:600;color:var(--text);min-width:80px;}
.settings-input{font-family:"Sarabun",sans-serif;font-size:.8rem;padding:.38rem .7rem;border:1.5px solid var(--border);border-radius:8px;color:var(--text);flex:1;min-width:200px;}
.settings-input:focus{outline:none;border-color:var(--mg);}
.settings-note{font-size:.72rem;color:var(--muted);background:var(--mint);padding:.5rem .8rem;border-radius:8px;margin-top:.5rem;line-height:1.6;}
.btn-save-settings{padding:.5rem 1.2rem;border-radius:8px;border:none;cursor:pointer;background:var(--dg);color:#fff;font-family:"Sarabun",sans-serif;font-size:.82rem;font-weight:600;margin-top:.5rem;}
.btn-save-settings:hover{background:#1E3F1B;}
.divider{height:1px;background:var(--mint2);margin:.7rem 0;}
.round-settings-group{padding:.65rem .8rem;background:var(--mint);border-radius:8px;margin-bottom:.5rem;}
.round-settings-header{font-size:.78rem;font-weight:700;color:var(--dg);margin-bottom:.45rem;}

/* ── Summary ── */
.sum-box{background:#fff;border-radius:10px;padding:.85rem 1.1rem;box-shadow:0 1px 5px rgba(45,90,39,.07);margin-bottom:.8rem;}
.sum-title{font-size:.8rem;font-weight:700;color:var(--dg);margin-bottom:.5rem;}
.sum-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.3rem;font-size:.8rem;}
.sum-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ── Footer ── */
.footer{text-align:center;font-size:.67rem;color:var(--muted);padding:1rem 2rem;border-top:1px solid var(--mint2);max-width:960px;margin:0 auto;}
.footer strong{color:var(--mg);}

/* ── Toast ── */
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--dg);color:#fff;padding:.55rem .95rem;border-radius:8px;font-size:.76rem;font-weight:600;transform:translateY(60px);opacity:0;transition:all .25s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── Skel ── */
.skel{background:linear-gradient(90deg,var(--mint2) 25%,var(--mint) 50%,var(--mint2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:7px;height:16px;margin:2px 0;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:#fff;border-radius:9px;padding:.65rem .9rem;border-left:4px solid var(--mint2);margin-bottom:.38rem;}
</style>
</head>
<body>

<!-- ── Floating Register Button ── -->
<a href="https://forms.gle/3utEAcFEz9Z4KyWk6" target="_blank" class="reg-float">
  📝 ลงทะเบียน <span class="rbadge" id="floatBadge">รุ่น 2</span>
</a>

<!-- ── Header ── -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="org">⚖️ Nitirat Law & Collection — HR</div>
    <h1>อบรม <span>Macro & VBA</span> — ระบบติดตาม</h1>
    <div class="hdr-row2">
      <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
        <div class="live-badge"><div class="dot" id="dot"></div><span id="liveStatus">กำลังโหลด...</span></div>
        <div class="live-badge" id="countdownBadge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)">🔄 60s</div>
      </div>
      <div class="hdr-actions">
        <button class="hdr-btn" onclick="loadSheet();startAutoRefresh()">🔄 Refresh</button>
        <button class="hdr-btn" onclick="go('settings')">⚙️ ตั้งค่า</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Stats ── -->
<div class="stats">
  <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">ลงทะเบียนทั้งหมด</div></div>
  <div class="stat"><div class="stat-n" id="sRounds">—</div><div class="stat-l">จำนวนรุ่น</div></div>
  <div class="stat"><div class="stat-n" id="sR1Att">—</div><div class="stat-l">เข้าร่วมจริง รุ่น 1</div></div>
  <div class="stat"><div class="stat-n" id="sSwaps">—</div><div class="stat-l">สลับตัว</div></div>
</div>

<!-- ── Tabs (dynamic) ── -->
<div class="tabs-wrap" id="tabsWrap"></div>

<!-- ── Main ── -->
<div class="main" id="mainContent"></div>

<div class="footer"><span id="footerTs">—</span> &nbsp;·&nbsp; จัดโดย <strong>ฝ่าย HR นิติรัฐ Law & Collection</strong></div>
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const SHEET_ID   = "1ecMncRWKY0TnKUs8gooGWktRQBcXaKZtP834YebgfBg";
const ROUND_SIZE = 10;

// ── API Config ───────────────────────────────────────────────────────
// 👇 วาง URL จาก Apps Script Deploy ตรงนี้
const API_URL = "https://script.google.com/macros/s/AKfycbwiJCa7z0F5PRBQ8Tz9IUQPLBHDRklTURZDj_E_opcUFSL_obMV1JOTmFQ-W8zUe__Q/exec";
const USE_API = API_URL !== "";  // true = ใช้ Sheets API, false = ใช้ localStorage

// ── State ────────────────────────────────────────────────────────────
let allData          = [];
let allAtt           = JSON.parse(localStorage.getItem("allAtt_v2")     || "{}");
let allSwapMap       = JSON.parse(localStorage.getItem("allSwapMap_v2") || "{}");
let selectedAttRound = 1;
let manualRounds     = parseInt(localStorage.getItem("manualRounds") || "1");

// Migrate legacy R1 data
(function(){
  const a = localStorage.getItem("att3_r1");
  const s = localStorage.getItem("swap3_r1");
  if(a && !allAtt["1"])     allAtt["1"]     = JSON.parse(a);
  if(s && !allSwapMap["1"]) allSwapMap["1"] = JSON.parse(s);
})();

function attFor(r)           { return allAtt[r]     || {}; }
function swapMapFor(r)       { return allSwapMap[r] || {}; }
function toggleAttEntry(r,id,val){ if(!allAtt[r]) allAtt[r]={}; if(val===null) delete allAtt[r][id]; else allAtt[r][id]=val; }
function setSwapEntry(r,id,p){ if(!allSwapMap[r]) allSwapMap[r]={}; allSwapMap[r][id]=p; }
function delSwapEntry(r,id)  { if(allSwapMap[r]) delete allSwapMap[r][id]; }
let roundDates = JSON.parse(localStorage.getItem("roundDates") || JSON.stringify({
  1: { date: "วันเสาร์ที่ 25 เมษายน 2569",     meta: "09.30–15.00 น. · ห้องประชุม 1 · วิทยากร: ทีม HR นิติรัฐ" },
  2: { date: "วันพฤหัสบดีที่ 15 พฤษภาคม 2569", meta: "09.30–15.00 น. · ห้องประชุม 1" },
  3: { date: "",                                  meta: "09.30–15.00 น. · ห้องประชุม 1" },
  4: { date: "",                                  meta: "09.30–15.00 น. · ห้องประชุม 1" },
}));
let pendingSwapFor = null;
let activeTab = "r1";

// ── API helpers ──────────────────────────────────────────────────────
async function apiGet(action, data){
  if(!USE_API) return null;
  let url = `${API_URL}?action=${action}`;
  if(data) url += `&data=${encodeURIComponent(JSON.stringify(data))}`;
  const res  = await fetch(url);
  return res.json();
}

async function loadAttFromAPI(){
  if(!USE_API) return;
  try{
    const res = await apiGet("get");

    // ── allAtt ──────────────────────────────────────────────────────
    if(res.allAtt && Object.keys(res.allAtt).length > 0){
      const fresh = {};
      Object.entries(res.allAtt).forEach(([r,rd])=>{
        if(!rd || !Object.keys(rd).length) return; // skip empty rounds
        fresh[r]={};
        Object.entries(rd).forEach(([k,v])=>{ fresh[r][String(k).padStart(4,"0")]=v; });
      });
      // Only overwrite if API actually has data (prevent blank reset)
      if(Object.keys(fresh).length > 0) allAtt = fresh;
    } else if(res.att && Object.keys(res.att).length > 0){ // backward compat
      const fresh = {};
      Object.entries(res.att).forEach(([k,v])=>{ fresh[String(k).padStart(4,"0")]=v; });
      if(Object.keys(fresh).length > 0) allAtt["1"] = fresh;
    }

    // ── allSwapMap ──────────────────────────────────────────────────
    if(res.allSwapMap && Object.keys(res.allSwapMap).length > 0){
      const fresh = {};
      Object.entries(res.allSwapMap).forEach(([r,rd])=>{
        if(!rd || !Object.keys(rd).length) return;
        fresh[r]={};
        Object.entries(rd).forEach(([k,v])=>{
          const key=String(k).padStart(4,"0");
          if(v&&v.id) v.id=String(v.id).padStart(4,"0");
          fresh[r][key]=v;
        });
      });
      if(Object.keys(fresh).length > 0) allSwapMap = fresh;
    } else if(res.swapMap && Object.keys(res.swapMap).length > 0){
      const fresh = {};
      Object.entries(res.swapMap).forEach(([k,v])=>{
        const key=String(k).padStart(4,"0");
        if(v&&v.id) v.id=String(v.id).padStart(4,"0");
        fresh[key]=v;
      });
      if(Object.keys(fresh).length > 0) allSwapMap["1"] = fresh;
    }

    if(res.roundDates && Object.keys(res.roundDates).length > 0)
      roundDates = res.roundDates;

    saveLocal();
  }catch(e){ console.warn("API load failed, using localStorage", e); }
}

async function saveToAPI(){
  if(!USE_API){ saveLocal(); return; }
  try{
    await apiGet("setAtt",   { allAtt, allSwapMap });
    await apiGet("setDates", roundDates);
    saveLocal(); // backup ใน localStorage ด้วยเสมอ
  }catch(e){
    console.warn("API save failed, saved locally only", e);
    saveLocal();
    toast("⚠️ บันทึก local เท่านั้น (API ไม่ตอบสนอง)");
  }
}

function saveLocal(){
  localStorage.setItem("allAtt_v2",     JSON.stringify(allAtt));
  localStorage.setItem("allSwapMap_v2", JSON.stringify(allSwapMap));
  localStorage.setItem("roundDates",    JSON.stringify(roundDates));
  localStorage.setItem("manualRounds",  String(manualRounds));
}

// ── Round colors ─────────────────────────────────────────────────────
const ROUND_COLORS = [

function addRound(){
  manualRounds++;
  localStorage.setItem("manualRounds", manualRounds);
  buildUI();
  go("settings");
  toast(`➕ เพิ่มรุ่น ${manualRounds} แล้ว`);
}
function removeLastRound(){
  if(manualRounds <= 1){ toast("ต้องมีอย่างน้อย 1 รุ่น"); return; }
  if(!confirm(`ลบรุ่น ${manualRounds} ออก? (ข้อมูลเช็คชื่อรุ่นนี้จะยังอยู่)`)) return;
  manualRounds--;
  localStorage.setItem("manualRounds", manualRounds);
  if(selectedAttRound > manualRounds) selectedAttRound = manualRounds;
  buildUI();
  go("settings");
  toast(`ลบรุ่น ${manualRounds+1} แล้ว`);
}
function roundSlice(r){ return allData.slice((r-1)*ROUND_SIZE, r*ROUND_SIZE); }

// รายชื่อจริงในรุ่น r (รวมคนที่ย้ายมาจากรุ่นก่อน + ลบคนที่ขยับขึ้นรุ่นก่อน)
function getRoundEffective(r){
  const prevRound = r - 1;
  const base      = roundSlice(r);
  if(prevRound < 1) return base; // รุ่น 1 ไม่มีคนย้ายมา

  const prevAtt     = attFor(prevRound);
  const prevSwapMap = swapMapFor(prevRound);

  // คนที่ขยับขึ้นจากรุ่นนี้ไปรุ่นก่อนแล้ว → ต้องเอาออก
  const swapUpIds = new Set(
    Object.values(prevSwapMap).map(v=>v&&v.id).filter(Boolean)
  );

  // คนรุ่นก่อนที่ไม่มา → ย้ายลงมารุ่นนี้ (อยู่ต้นคิว)
  // ใช้ getRoundEffective(prevRound) ไม่ใช่ roundSlice
  // เพื่อให้รวมคนที่ "ย้ายมาจากรุ่นก่อนหน้า" ด้วย (multi-hop)
  const prevEffective = prevRound === 1 ? roundSlice(1) : getRoundEffective(prevRound);
  const movedDown = prevEffective
    .filter(p => prevAtt[p.id]==="swapped" || prevAtt[p.id]==="absent")
    .map(p => ({...p, movedFrom: prevRound}));

  return [
    ...movedDown,
    ...base.filter(p => !swapUpIds.has(p.id))
  ];
}
// Backward compat alias
function getR2Effective(){ return getRoundEffective(2); }

function fmtTime(ts){
  if(!ts) return "";
  try{
    // Handle gviz format: "Date(2026,3,20,8,59,13)" (month is 0-indexed)
    const gv = String(ts).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+)/);
    if(gv){
      const mo=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
      return `${gv[3]} ${mo[+gv[2]]} ${String(gv[4]).padStart(2,"0")}:${String(gv[5]).padStart(2,"0")}`;
    }
    // Handle MM/DD/YYYY HH:MM
    const m = String(ts).match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(!m) return ts;
    const mo=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","พ.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    return `${m[2]} ${mo[+m[1]]} ${m[4]}:${m[5]}`;
  }catch(e){return ts;}
}

async function loadSheet(){
  setStatus("loading");
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&t=${Date.now()}`;
  try{
    const res=await fetch(url);
    const text=await res.text();
    const json=JSON.parse(text.substring(47).slice(0,-2));
    const seen=new Set();
    allData=json.table.rows
      .map(r=>({name:(r.c[2]?.v||"").trim(),nick:(r.c[3]?.v||"").trim(),
                id:String(r.c[1]?.v||"").padStart(4,"0"),time:fmtTime(r.c[0]?.v||"")}))
      .filter(r=>r.name&&!seen.has(r.id)&&seen.add(r.id));
    setStatus("ok",`ข้อมูลสด · ${allData.length} รายการ · ${new Date().toLocaleTimeString("th-TH")}`);
  }catch(e){
    allData=FALLBACK.map(r=>({...r}));
    setStatus("err","ใช้ข้อมูลสำรอง — ตั้ง Sheet เป็น Public แล้ว Refresh");
  }
  await loadAttFromAPI();
  buildUI();
}

function setStatus(s,msg){
  document.getElementById("dot").className=s==="err"?"dot err":"dot";
  document.getElementById("liveStatus").textContent=msg||(s==="loading"?"กำลังโหลด...":"");
}

// ── Build dynamic UI ──────────────────────────────────────────────────
function buildUI(){
  const n = numRounds();

  // Stats
  const curAtt  = attFor(selectedAttRound);
  const curSwap = swapMapFor(selectedAttRound);
  const present   = Object.values(curAtt).filter(v=>v==="yes").length;
  const absentCnt = Object.values(curAtt).filter(v=>v==="absent").length;
  const swaps     = Object.keys(curSwap).length;
  document.getElementById("sTotal").textContent  = allData.length;
  document.getElementById("sRounds").textContent = n;
  document.getElementById("sR1Att").textContent  = (present+swaps+absentCnt)||"—";
  document.getElementById("sSwaps").textContent  = swaps||"—";

  // Floating badge
  document.getElementById("floatBadge").textContent = `รุ่น ${manualRounds}`;

  // Footer
  const now=new Date().toLocaleDateString("th-TH",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  document.getElementById("footerTs").textContent="อัปเดตล่าสุด: "+now;

  // Build tabs
  buildTabs(n);

  // Build panels
  buildPanels(n);

  // Activate current tab
  activateTab(activeTab);

  // Re-render picker หลัง DOM พร้อม
  if(pendingSwapFor){
    setTimeout(()=>{ renderPickerInline(pendingSwapFor); }, 0);
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────
function buildTabs(n){
  const wrap = document.getElementById("tabsWrap");
  const roundEmojis = ["✅","🕐","🔵","🟣"];
  let tabs = "";
  for(let r=1;r<=n;r++){
    tabs += `<button class="tab" data-tab="r${r}" onclick="go('r${r}')">${roundEmojis[r-1]||"⏳"} รุ่น ${r}</button>`;
  }
  tabs += `<button class="tab" data-tab="all" onclick="go('all')">📋 ทั้งหมด</button>`;
  tabs += `<button class="tab hr" data-tab="att" onclick="go('att')">📝 เช็คชื่อ (HR)</button>`;
  tabs += `<button class="tab settings" data-tab="settings" onclick="go('settings')">⚙️ ตั้งค่า</button>`;
  wrap.innerHTML = tabs;
}

// ── Panels ────────────────────────────────────────────────────────────
function buildPanels(n){
  const mc = document.getElementById("mainContent");
  let html = "";

  for(let r=1;r<=n;r++){
    const data = r > 1 ? getRoundEffective(r) : roundSlice(r);
    const col  = ROUND_COLORS[Math.min(r-1,3)];
    const cfg  = roundDates[r] || {date:"ยังไม่กำหนดวันที่",meta:"09.30–15.00 น. · ห้องประชุม 1"};
    const pct  = Math.min(100, Math.round(data.length/ROUND_SIZE*100));
    const isFull = roundSlice(r).length >= ROUND_SIZE;

    html += `<div class="panel" id="p-r${r}">
      <div class="rcard" style="border-left-color:${col.color}">
        <div>
          <div class="rdate" style="color:${col.color}">${cfg.date||`<span style="color:var(--muted)">ยังไม่กำหนดวันที่ — กด ⚙️ ตั้งค่า</span>`}</div>
          <div class="rmeta">${cfg.meta}</div>
        </div>
      </div>
      <div class="cap-card">
        <div><div class="cap-n">${data.length}</div><div class="cap-sub">คน</div></div>
        <div class="cap-bw">
          <div class="cap-row"><span>รุ่นที่ ${r}</span><span>${data.length} / ${ROUND_SIZE} ที่นั่ง</span></div>
          <div class="cap-bar"><div class="cap-fill ${col.fill}" style="width:${pct}%"></div></div>
          <div class="cap-st" style="color:${col.color}">${isFull?`✅ รุ่น ${r} เต็มแล้ว`:`🟡 รับได้อีก ${ROUND_SIZE-data.length} ที่นั่ง`}</div>
        </div>
      </div>
      <div class="sh"><span class="sbadge ${col.badge}">รุ่นที่ ${r}</span><span class="scnt">${data.length} คน</span></div>
      <div class="cards">${renderCards(data, r)}</div>
    </div>`;
  }

  // All tab
  html += `<div class="panel" id="p-all">
    <div class="sh"><span class="sbadge sb-g">📋 ทั้งหมด</span><span class="scnt">${allData.length} คน</span></div>
    <div class="cards">${allData.map((p,i)=>{
      const r = Math.floor(i/ROUND_SIZE)+1;
      const col = ROUND_COLORS[Math.min(r-1,3)];
      return mkCard(p, i+1, col.cls, `<div class="tag ${col.tagOk}">รุ่น ${r}</div>`, i*.035);
    }).join("")}</div>
  </div>`;

  // Att tab
  html += `<div class="panel" id="p-att">${buildAttPanel()}</div>`;

  // Settings tab
  html += `<div class="panel" id="p-settings">${buildSettingsPanel(n)}</div>`;

  mc.innerHTML = html;

  // Re-render pickers if any pending
  if(pendingSwapFor && att[pendingSwapFor]==="swapped"){
    renderPickerInline(pendingSwapFor);
  }
}

function renderCards(data, round){
  if(!data.length) return `<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:.82rem">ยังไม่มีรายชื่อ</div>`;
  const col = ROUND_COLORS[Math.min(round-1,3)];
  return data.map((p,i)=>{
    const rankLabel = p.movedFrom==="r1" ? `↓` : (round>1?`#${i+1}`:`${i+1}`);
    const tag = p.movedFrom==="r1"
      ? `<div class="tag t-mov">ย้ายจากรุ่น 1</div>`
      : `<div class="tag ${col.tagOk}">${round===1?"ยืนยันสิทธิ์":"รอรุ่น "+round}</div>`;
    return mkCard(p, rankLabel, col.cls, tag, i*.045);
  }).join("");
}

function mkCard(p, rank, cls, tagHtml, delay=0){
  return `<div class="card ${cls}" style="animation-delay:${delay}s">
    <div class="rank">${rank}</div>
    <div class="ava">${p.name.charAt(0)}</div>
    <div class="ci"><div class="cn">${p.name}</div><div class="ck">ชื่อเล่น: ${p.nick}</div></div>
    <div class="cr"><div class="cid">${p.id}</div><div class="ct">${p.time||""}</div>${tagHtml}</div>
  </div>`;
}

// ── Att panel ─────────────────────────────────────────────────────────
function buildAttPanel(){
  const n       = numRounds();
  const rSlice  = selectedAttRound > 1 ? getRoundEffective(selectedAttRound) : roundSlice(selectedAttRound);
  const curAtt  = attFor(selectedAttRound);
  const curSwap = swapMapFor(selectedAttRound);
  const present = rSlice.filter(p=>curAtt[p.id]==="yes").length;
  const absent  = rSlice.filter(p=>curAtt[p.id]==="absent").length;
  const swaps   = Object.keys(curSwap).length;
  const total   = present+swaps;
  const col     = ROUND_COLORS[Math.min(selectedAttRound-1,3)];

  let html = "";

  // ── Round selector ───────────────────────────────────────────────
  html += `<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;align-items:center">
    <span style="font-size:.74rem;color:var(--muted);font-weight:600">เช็คชื่อรุ่น:</span>`;
  for(let r=1;r<=n;r++){
    const rA   = attFor(r);
    const rS   = swapMapFor(r);
    const cnt  = Object.values(rA).filter(v=>v==="yes"||v==="absent").length + Object.keys(rS).length;
    const rsz  = r > 1 ? getRoundEffective(r).length : roundSlice(r).length;
    const on   = r===selectedAttRound;
    html += `<button onclick="selectAttRound(${r})" style="
      padding:.42rem .95rem;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;
      border:2px solid ${on?"transparent":"var(--border)"};
      background:${on?"var(--dg)":"#fff"};color:${on?"#fff":"var(--muted)"};
      font-family:'Sarabun',sans-serif;transition:all .15s">
      รุ่น ${r}${cnt>0?` <span style="background:${on?"rgba(255,255,255,.22)":"var(--mint2)"};padding:1px 6px;border-radius:9px;font-size:.65rem">${cnt}/${rsz}</span>`:""}
    </button>`;
  }
  html += `</div>`;

  // ── Summary ──────────────────────────────────────────────────────
  if(total>0){
    html += `<div class="sum-box">
      <div class="sum-title">📊 สรุปการเข้าร่วมจริง รุ่น ${selectedAttRound}</div>
      <div class="sum-row"><div class="sum-dot" style="background:var(--mg)"></div><span>เข้าร่วม: <strong>${present} คน</strong></span></div>
      ${absent?`<div class="sum-row"><div class="sum-dot" style="background:var(--red)"></div><span>ไม่มา (ย้ายรุ่นถัดไป): <strong>${absent} คน</strong></span></div>`:""}
      ${swaps?`<div class="sum-row"><div class="sum-dot" style="background:var(--orange)"></div><span>สลับตัว: <strong>${swaps} คู่</strong></span></div>`:""}
      <div class="sum-row" style="border-top:1px solid var(--mint2);margin-top:.3rem;padding-top:.3rem">
        <div class="sum-dot" style="background:var(--dg)"></div>
        <span>รวม: <strong>${total} / ${rSlice.length} คน</strong></span>
      </div>
    </div>`;
  }

  html += `<div class="sh"><span class="sbadge ${col.badge}">เช็คชื่อ รุ่น ${selectedAttRound}</span>
    <span style="font-size:.7rem;color:var(--muted)">✓ มา &nbsp;|&nbsp; ↔ สลับกับคนรุ่นถัดไป</span>
  </div>`;

  // ── แถวแต่ละคน ───────────────────────────────────────────────────
  rSlice.forEach((p,i)=>{
    const st   = curAtt[p.id];
    const swap = curSwap[p.id];
    const isYes    = st==="yes";
    const isAbsent = st==="absent";
    const isSwap   = st==="swapped";
    const rowCls   = isYes?"r1":( isAbsent||isSwap )?"moved-down":"r1";
    let stTag="";
    if(isYes)    stTag=`<div class="tag t-pres">✓ มา</div>`;
    if(isAbsent) stTag=`<div class="tag" style="background:var(--rbg);color:var(--red);font-size:.6rem">✗ ไม่มา → รุ่นถัดไป</div>`;
    if(isSwap)   stTag=swap
      ?`<div class="tag" style="background:var(--obg);color:var(--orange);font-size:.6rem">↔ สลับกับ ${swap.nick}</div>`
      :`<div class="tag" style="background:var(--obg);color:var(--orange);font-size:.6rem">↔ รอเลือกผู้แทน</div>`;
    html+=`<div class="card ${rowCls}" style="animation-delay:${i*.05}s">
      <div class="rank">${i+1}</div>
      <div class="ava">${p.name.charAt(0)}</div>
      <div class="ci"><div class="cn">${p.name}</div><div class="ck">${p.nick}</div>${stTag}</div>
      <div class="att-btns">
        <button class="att-btn yes ${isYes?"active":""}" onclick="markYes('${p.id}')">✓ มา</button>
        <button class="att-btn absent ${isAbsent?"active":""}" onclick="markAbsent('${p.id}')">✗ ไม่มา</button>
        <button class="att-btn swap ${isSwap?"active":""}" onclick="markSwap('${p.id}')">↔ สลับ</button>
        ${(isYes||isAbsent||isSwap)?`<button class="att-btn clr" onclick="clearAtt('${p.id}')">↺</button>`:""}
      </div>
    </div>
`;
    // Picker inline
    if(pendingSwapFor===p.id && isSwap && !swap){
      html += buildPickerHTML(p.id);
    }
  });

  // ── Swap-ups ──────────────────────────────────────────────────────
  if(Object.keys(curSwap).length){
    html+=`<div style="margin:.65rem 0 .3rem;font-size:.72rem;font-weight:700;color:var(--orange)">🔄 ขยับขึ้นจากรุ่น ${selectedAttRound+1}</div>`;
    Object.entries(curSwap).forEach(([r1Id,r2p])=>{
      html+=`<div class="card swapped-up" style="display:flex;align-items:center">
        <div class="rank">↑</div>
        <div class="ava">${r2p.name.charAt(0)}</div>
        <div class="ci"><div class="cn">${r2p.name}</div><div class="ck">${r2p.nick} · แทน ${getR1Nick(r1Id)}</div></div>
        <div class="cr"><div class="cid">${r2p.id}</div><div class="tag t-swu">เข้าแทน</div></div>
        <button class="att-btn clr" style="margin-left:6px" onclick="removeSwapUp('${r1Id}')">✕</button>
      </div>`;
    });
  }

  html+=`<div style="display:flex;gap:.5rem;margin-top:.85rem;flex-wrap:wrap">
    <button onclick="saveAll()" style="padding:.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer;background:var(--dg);color:#fff;font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:600">💾 บันทึก</button>
    <button onclick="if(confirm('Reset การเช็คชื่อรุ่น ${selectedAttRound}?')){if(allAtt[selectedAttRound])delete allAtt[selectedAttRound];if(allSwapMap[selectedAttRound])delete allSwapMap[selectedAttRound];saveAll();buildUI();activateTab('att');toast('Reset รุ่น ${selectedAttRound} แล้ว')}" style="padding:.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer;background:var(--rbg);color:var(--red);font-family:'Sarabun',sans-serif;font-size:.78rem;font-weight:600">🔄 Reset รุ่น ${selectedAttRound}</button>
  </div>`;
  return html;
}

  let rows = "";
  for(let r=1;r<=maxR;r++){

    ${rows}
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
      <button class="btn-save-settings" onclick="saveSettings(${maxR})">💾 บันทึกการตั้งค่า</button>
      <button onclick="addRound()" style="padding:.5rem 1.1rem;border-radius:8px;border:1.5px solid var(--mg);background:#fff;color:var(--mg);font-family:'Sarabun',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer">➕ เพิ่มรุ่น ${n+1}</button>
      ${n>1?`<button onclick="removeLastRound()" style="padding:.5rem 1.1rem;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-family:'Sarabun',sans-serif;font-size:.78rem;cursor:pointer">➖ ลบรุ่น ${n}</button>`:""}
    </div>
    <div class="divider"></div>
    <div class="round-settings-group">
      <div class="round-settings-header">🔗 Google Apps Script API</div>
      <div class="settings-row">
        <div class="settings-label">API URL</div>
        <input class="settings-input" id="apiUrlInput"
          placeholder="https://script.google.com/macros/s/XXXXX/exec"
          value="${USE_API ? API_URL : localStorage.getItem('apiUrl')||''}" />
      </div>
      <div style="display:flex;gap:.5rem;margin-top:.4rem;flex-wrap:wrap">
        <button class="btn-save-settings" onclick="saveApiUrl()">💾 บันทึก URL</button>
        <div style="font-size:.72rem;color:${USE_API?'var(--mg)':'var(--red)'};display:flex;align-items:center;gap:4px">
          <div style="width:8px;height:8px;border-radius:50%;background:${USE_API?'var(--mg)':'var(--muted)'};flex-shrink:0"></div>
          ${USE_API ? "✅ ใช้ Apps Script API" : "⚠️ ยังใช้ localStorage"}
        </div>
      </div>
    </div>
    <div class="settings-note">
      💡 กด "เพิ่มรุ่น" เมื่อต้องการเปิดรุ่นใหม่ — ระบบจะสร้างแท็บและหน้าเช็คชื่อให้อัตโนมัติ<br>
      ข้อมูลผู้ลงทะเบียนในแต่ละรุ่นแบ่งตามลำดับ ${ROUND_SIZE} คน/รุ่น
    </div>
  </div>`;
}

function saveSettings(maxR){
  for(let r=1;r<=maxR;r++){
    const d = document.getElementById(`rdate-${r}`)?.value||"";
    const m = document.getElementById(`rmeta-${r}`)?.value||"";
    roundDates[r] = { date: d, meta: m };
  }
  saveLocal();
  if(USE_API) saveToAPI().catch(e=>console.warn(e));
  buildUI(); go("settings");
  toast("💾 บันทึกการตั้งค่าแล้ว ✓");
}

// ── Att actions ───────────────────────────────────────────────────────
function markYes(id){
  toggleAttEntry(selectedAttRound,id,"yes"); delSwapEntry(selectedAttRound,id); pendingSwapFor=null;
  saveAll(); buildUI(); activateTab("att");
}

function markAbsent(id){
  toggleAttEntry(selectedAttRound,id,"absent");
  delSwapEntry(selectedAttRound,id);
  if(pendingSwapFor===id) pendingSwapFor=null;
  saveAll(); buildUI(); activateTab("att");
}

function markSwap(id){
  if(pendingSwapFor===id){ pendingSwapFor=null; buildUI(); activateTab("att"); return; }
  toggleAttEntry(selectedAttRound,id,"swapped");
  pendingSwapFor=id;
  saveAll(); buildUI(); activateTab("att");
}

function clearAtt(id){
  toggleAttEntry(selectedAttRound,id,null); delSwapEntry(selectedAttRound,id); pendingSwapFor=null;
  saveAll(); buildUI(); activateTab("att");
}

function removeSwapUp(r1Id){
  delSwapEntry(selectedAttRound,r1Id);
  saveAll(); buildUI(); activateTab("att");
}

// สร้าง picker HTML string — ใช้ตอน build panel (ไม่ต้อง DOM manipulation)
function buildPickerHTML(r1Id){
  const curSwap   = swapMapFor(selectedAttRound);
  const nextRound = selectedAttRound+1;
  const swapUpIds = new Set(Object.entries(curSwap).filter(([k])=>k!==r1Id).map(([,v])=>v&&v.id).filter(Boolean));
  const nextPool  = roundSlice(nextRound);
  const r2avail   = nextPool.filter(p=>!swapUpIds.has(p.id));
  const r1Nick    = getR1Nick(r1Id);
  const opts = r2avail.map((p,qi)=>`
    <div class="swap-option" onclick="confirmSwap('${r1Id}','${p.id}')">
      <div class="ava" style="background:linear-gradient(135deg,var(--purple),#9B7EC8);width:27px;height:27px;font-size:.76rem;flex-shrink:0">${p.name.charAt(0)}</div>
      <div style="flex:1"><div class="swap-opt-name">${p.name}</div><div class="swap-opt-sub">${p.nick} · คิวที่ ${qi+1} ในรุ่น ${nextRound}</div></div>
      <div class="swap-go">เลือก →</div>
    </div>`).join("") || `<div style="color:var(--muted);font-size:.78rem;padding:.5rem">ไม่มีรายชื่อในรุ่น ${nextRound}</div>`;
  return `<div class="swap-sel" style="margin:.3rem 0 .5rem 1.5rem">
    <div class="swap-sel-title">เลือกคนจากรุ่น ${nextRound} มาแทน "${r1Nick}"</div>
    ${opts}
    <div class="swap-cancel" onclick="cancelPendingSwap()">✕ ปิด</div>
  </div>`;
}

function renderPickerInline(r1Id){ /* deprecated — ใช้ buildPickerHTML แทน */ }

function closePickerOnly(r1Id){
  const el=document.getElementById("picker-"+r1Id);
  if(el) el.innerHTML="";
}

function confirmSwap(r1Id, r2Id){
  const r2p = allData.find(p=>p.id===r2Id);
  if(!r2p) return;
  setSwapEntry(selectedAttRound,r1Id,{...r2p});
  pendingSwapFor = null;
  saveAll(); buildUI(); activateTab("att");
  toast(`↔ ${getR1Nick(r1Id)} ⇄ ${r2p.nick}`);
}

function getR1Nick(id){
  const src = selectedAttRound===2 ? getR2Effective() : roundSlice(selectedAttRound);
  const p   = src.find(x=>x.id===id);
  return p?(p.nick||p.name):id;
}

function saveAll(){
  // บันทึก localStorage ทันที (sync) ก่อนเสมอ
  saveLocal();
  toast("💾 บันทึกแล้ว ✓");
  // ถ้ามี API ก็บันทึกขึ้น Sheets ด้วย (async)
  if(USE_API){
    saveToAPI().catch(e => console.warn("API save failed:", e));
  }
}

// ── Tab switch ────────────────────────────────────────────────────────
function go(id){
  activeTab=id;
  activateTab(id);
}

function activateTab(id){
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("on", t.dataset.tab===id);
  });
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  const target=document.getElementById("p-"+id);
  if(target) target.classList.add("on");
}

function saveApiUrl(){
  const url = document.getElementById("apiUrlInput")?.value?.trim()||"";
  localStorage.setItem("apiUrl", url);
  // Reload page to apply new API_URL
  toast("บันทึก URL แล้ว — กำลัง Reload...");
  setTimeout(()=>{
    // inject the URL into the page constant by reloading
    window.location.reload();
  }, 1200);
}

function selectAttRound(r){
  selectedAttRound=r; pendingSwapFor=null;
  buildUI(); activateTab("att");
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

// ── Auto Refresh ─────────────────────────────────────────────────────
const REFRESH_SEC = 60; // ดึงข้อมูลใหม่ทุก 60 วินาที
let countdown = REFRESH_SEC;
let refreshTimer = null;
let countdownTimer = null;

function startAutoRefresh(){
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  countdown = REFRESH_SEC;

  refreshTimer = setInterval(()=>{
    loadSheet();
    countdown = REFRESH_SEC;
  }, REFRESH_SEC * 1000);

  countdownTimer = setInterval(()=>{
    countdown--;
    const el = document.getElementById("countdownBadge");
    if(el) el.textContent = `🔄 ${countdown}s`;
    if(countdown <= 0) countdown = REFRESH_SEC;
  }, 1000);
}

// ── Init ──────────────────────────────────────────────────────────────
loadSheet();
startAutoRefresh();
</script>
</body>
</html>
